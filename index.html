<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>komotesting</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pruger/tiny-brutalism-css/tiny-brutalism.css">
  <style>
    body {
      padding: 2rem;
    }
    .links {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .links li a {
      display: block;
      padding: 1rem 1.5rem;
      border: 2px solid #000;
      box-shadow: 4px 4px 0 #000;
      text-decoration: none;
      font-weight: 700;
      transition: box-shadow 0.1s ease, transform 0.1s ease;
    }
    .links li a:hover {
      box-shadow: 6px 6px 0 #000;
      transform: translate(-1px, -1px);
      color: #000;
    }
    .links li a span {
      display: block;
      font-weight: 400;
      font-size: 0.85rem;
      margin-top: 0.25rem;
      color: #555;
    }
    hr {
      border: none;
      border-top: 2px solid #000;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>komotesting</h1>
    <p>Embed testing pages</p>
    <hr>
    <ul class="links">
      <li>
        <a href="komo-embed/prod.html">
          prod
          <span>prodhub.samcarton.com card embed</span>
        </a>
      </li>
      <li>
        <a href="komo-embed/staging.html">
          staging
          <span>Cover + trigger embed on staging</span>
        </a>
      </li>
      <li>
        <a href="komo-embed/staging-jwt.html">
          staging &mdash; JWT
          <span>Komo embed demo with JWT auth</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
